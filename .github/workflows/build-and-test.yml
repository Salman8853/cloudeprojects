name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run tests with Maven
      run: mvn test

    - name: Build JAR with Maven
      run: mvn clean package

    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: application-jar
        path: target/*.jar
        retention-days: 30

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/management:latest,${{ secrets.DOCKERHUB_USERNAME }}/management:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/management:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/management:buildcache,mode=max

    - name: Display build summary
      run: |
        echo "✅ Build, tests, and Docker image push completed successfully!"
        echo "Docker image pushed to: ${{ secrets.DOCKERHUB_USERNAME }}/management:latest"
        echo "Docker image tag: ${{ secrets.DOCKERHUB_USERNAME }}/management:${{ github.sha }}"
